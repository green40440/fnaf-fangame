<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9 DaYs aT BoBs</title>
    <style>
        :root {
            --bg-dark: #050505;
            --office-gray: #1a1a1a;
            --ui-blue: #00f2ff;
            --warning-red: #ff3333;
            --gold: #ffd700;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Office Styling */
        #office {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #111, #222, #111);
            display: flex;
            justify-content: space-between;
            align-items: center;
            perspective: 1000px;
        }

        .hallway-section {
            width: 30%;
            height: 80%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .hallway {
            width: 100%;
            height: 70%;
            background: #000;
            border: 4px solid #333;
            position: relative;
            transition: background 0.1s;
            overflow: hidden;
        }

        .hallway.light-on {
            background: #444;
            box-shadow: inset 0 0 50px #fff;
        }

        .window {
            width: 80%;
            height: 25%;
            background: #050505;
            border: 4px solid #444;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            transition: background 0.1s;
            z-index: 5;
        }

        .window.light-on {
            background: #222;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .door-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: #444;
            transform: translateY(-100%);
            transition: transform 0.2s ease-in;
            z-index: 20;
            border-bottom: 10px solid #111;
        }

        .door-container.closed {
            transform: translateY(0);
        }

        .animatronic-at-door {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 180px;
            z-index: 10;
            pointer-events: none;
            filter: drop-shadow(0 0 20px black);
            opacity: 0;
            transition: opacity 0.1s;
        }

        .hallway.light-on .animatronic-at-door {
            opacity: 1;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 150px;
        }

        .btn {
            padding: 15px;
            background: #333;
            border: 2px solid #555;
            color: white;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            transition: background 0.2s;
        }

        .btn:active { background: #555; }
        .btn.active { background: var(--ui-blue); color: black; }

        #monitor-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            z-index: 100;
            flex-direction: column;
        }

        #camera-view {
            flex-grow: 1;
            border: 10px solid #222;
            margin: 20px;
            position: relative;
            background: #050505;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #camera-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            position: absolute;
            z-index: 1;
        }

        #static {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.2;
            background: url('https://media.giphy.com/media/oEI9uWUqWMrS/giphy.gif');
            pointer-events: none;
            z-index: 5;
        }

        .camera-map-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 340px;
            background: rgba(0,0,0,0.85);
            border: 2px solid var(--ui-blue);
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            z-index: 20;
        }

        .camera-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
        }

        .cam-btn {
            background: #000; border: 1px solid var(--ui-blue); color: var(--ui-blue);
            font-size: 11px; padding: 12px; cursor: pointer; text-align: center;
        }

        .cam-btn.active { background: var(--ui-blue); color: black; font-weight: bold; }

        .monitor-down-btn {
            grid-column: span 2;
            background: #222;
            border: 2px solid #555;
            color: white;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        #ui-layer {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            pointer-events: none; z-index: 150; text-align: center;
            background: rgba(0, 0, 0, 0.7); padding: 15px 40px; border-radius: 8px;
            border: 1px solid rgba(0, 242, 255, 0.3);
        }

        .screen {
            position: absolute; width: 100%; height: 100%; background: black;
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 20px;
            cursor: pointer;
        }

        .respawn-btn {
            margin-top: 10px; padding: 15px 40px; font-size: 20px;
            background: white; color: black; border: none; cursor: pointer;
            border-radius: 4px; font-weight: bold; min-width: 250px;
            transition: transform 0.1s;
        }
        
        .respawn-btn:active { transform: scale(0.95); }
        .respawn-btn.secondary { background: transparent; color: white; border: 2px solid white; }

        #cam-label {
            position: absolute; top: 20px; left: 20px; font-size: 24px;
            color: var(--ui-blue); z-index: 10; text-shadow: 2px 2px 10px black;
            background: rgba(0,0,0,0.6); padding: 8px 20px; border-left: 4px solid var(--ui-blue);
        }

        #animatronic-visual {
            position: relative; z-index: 6; display: flex; gap: 50px;
            justify-content: center; align-items: flex-end; padding: 20px; flex-wrap: wrap;
        }

        .cam-anim-icon { font-size: 150px; text-shadow: 0 0 40px rgba(255,255,255,0.3); }

        .jumpscare {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4000; background: black; display: none;
            justify-content: center; align-items: center; font-size: 300px;
            animation: shake 0.05s infinite;
        }

        @keyframes shake {
            0% { transform: translate(15px, 15px) scale(1.2); }
            50% { transform: translate(-15px, -15px) scale(1.1); }
            100% { transform: translate(15px, -15px) scale(1.2); }
        }

        #goldie-office {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 180px; z-index: 1000; display: none; filter: drop-shadow(0 0 30px var(--gold));
        }

        #goldie-timer {
            position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%);
            color: var(--gold); font-size: 30px; font-weight: bold; z-index: 1001; display: none;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .animatronic-lineup {
            display: flex; gap: 20px; margin-bottom: 60px;
            justify-content: center; align-items: flex-end; height: 180px;
            flex-wrap: wrap;
        }
        
        .anim-lineup-container { display: flex; flex-direction: column; align-items: center; position: relative; }

        .anim-lineup-name {
            font-size: 11px; color: var(--ui-blue); text-transform: uppercase;
            writing-mode: vertical-rl; transform: rotate(180deg);
            margin-bottom: 10px; letter-spacing: 2px; font-weight: bold;
        }

        .anim-lineup-icon { font-size: 50px; opacity: 0.9; }

        .jerry-warning { color: var(--warning-red) !important; animation: pulse 0.5s infinite; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="init-screen" class="screen">
        <h1 style="font-size: 60px; letter-spacing: 10px;">9 DaYs aT BoBs</h1>
        <h2 style="color: var(--ui-blue); opacity: 0.7; animation: pulse 2s infinite;">[ CLICK ANYWHERE TO START ]</h2>
    </div>

    <div id="start-screen" class="screen" style="display: none; cursor: default;">
        <div class="animatronic-lineup" id="lineup"></div>
        <h1 style="font-size: 56px; color: var(--ui-blue); margin: 0; letter-spacing: 4px;">9 DaYs aT BoBs</h1>
        <p id="night-display" style="font-size: 32px; margin: 20px 0; font-weight: bold;">NIGHT 1</p>
        <button class="respawn-btn" id="continue-btn">BEGIN SHIFT</button>
        <button class="respawn-btn secondary" id="new-game-btn">NEW GAME</button>
    </div>

    <div id="ui-layer" style="display: none;">
        <div style="display: flex; gap: 30px; font-size: 16px; font-weight: bold; color: var(--ui-blue);">
            <span id="jerry-ui-container">JERRY: <span id="jerry-ui-val">20</span>s</span>
            <span>POWER: <span id="power-val">100</span>%</span>
            <span>TIME: <span id="clock-val">12</span> AM</span>
            <span id="ui-night-val">Night 1</span>
        </div>
    </div>

    <div id="office" style="display: none;">
        <div id="goldie-office">🟡</div>
        <div id="goldie-timer">10</div>
        
        <div class="hallway-section">
            <div id="left-window" class="window"></div>
            <div id="left-hall" class="hallway">
                <div id="left-door-anim" class="animatronic-at-door"></div>
                <div id="left-door" class="door-container"></div>
            </div>
            <div class="controls">
                <button id="btn-door-l" class="btn">CLOSE DOOR</button>
                <button id="btn-light-l" class="btn">CHECK LIGHT</button>
            </div>
        </div>
        
        <div id="central-office" style="flex-grow: 1; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center;">
             <button class="btn" id="monitor-toggle-btn" style="width: 280px; height: 60px; border-color: var(--ui-blue); color: var(--ui-blue); font-size: 18px;">OPEN MONITOR</button>
        </div>

        <div class="hallway-section">
            <div id="right-window" class="window"></div>
            <div id="right-hall" class="hallway">
                <div id="right-door-anim" class="animatronic-at-door"></div>
                <div id="right-door" class="door-container"></div>
            </div>
            <div class="controls">
                <button id="btn-door-r" class="btn">CLOSE DOOR</button>
                <button id="btn-light-r" class="btn">CHECK LIGHT</button>
            </div>
        </div>
    </div>

    <div id="monitor-overlay">
        <div id="camera-view">
            <img id="camera-image" src="image_62587b.png" alt="Cam View" onerror="this.style.display='none'">
            <div id="static"></div>
            <div id="cam-label">CAM 01</div>
            <div id="animatronic-visual"></div>
            <div id="map-container" class="camera-map-container">
                <div class="camera-grid" id="camera-buttons"></div>
                <button class="monitor-down-btn" id="monitor-close-btn">MONITOR DOWN</button>
            </div>
        </div>
    </div>

    <div id="jumpscare" class="jumpscare">🤡</div>

    <div id="death-screen" class="screen" style="display: none;">
        <h1 style="font-size: 64px; color: var(--warning-red);">GAME OVER</h1>
        <button class="respawn-btn" id="retry-btn">RETRY NIGHT</button>
    </div>

    <div id="win-screen" class="screen" style="display: none;">
        <h1 style="color: var(--ui-blue); font-size: 80px;">06:00</h1>
        <button class="respawn-btn" id="win-btn">NEXT NIGHT</button>
    </div>

    <audio id="menu-music" preload="auto">
        <source src="Screen recording 2026-04-10 3.26.10 PM.webm" type="video/webm">
    </audio>
</div>

<script type="module">
    const ANIMS_DATA = [
        { name: "Bob", icon: "🤡", pos: 0, path: [0, 1, 3, "OFFICE_L"] },
        { name: "Silly", icon: "🤖", pos: 0, path: [0, 1, 4, "OFFICE_R"] },
        { name: "Jerry", icon: "🦊", pos: 8, path: [8, "OFFICE_R"], teleportOnly: true },
        { name: "Clowny", icon: "🎪", pos: 0, path: [0, 2, 5, 3, "OFFICE_L"] },
        { name: "Zoe", icon: "🦄", pos: 0, path: [0, 2, 6, 4, "OFFICE_R"] },
        { name: "Sunny", icon: "☀️", pos: 0, path: [0, 5, 7, 1, "OFFICE_L"] },
        { name: "Goldie", icon: "🟡", pos: 0, path: ["SPECIAL"], special: "goldie" }
    ];

    const ROOM_NAMES = ["Stage", "Dining", "Back", "L-Hall", "R-Hall", "Kitchen", "Closet", "Boiler", "Jerry's Den"];

    class Game {
        constructor() {
            this.currentNight = 1;
            this.power = 100;
            this.time = 0;
            this.currentCam = 0;
            this.isMonitorOpen = false;
            this.doors = { left: false, right: false };
            this.lights = { left: false, right: false };
            this.animatronics = JSON.parse(JSON.stringify(ANIMS_DATA));
            this.jerryTimer = 20; 
            this.goldieTimer = 10;
            this.goldieActive = false;
            this.isGameOver = false;

            this.init();
        }

        async init() {
            const saved = localStorage.getItem('bobs_save');
            if (saved) this.currentNight = parseInt(saved);
            document.getElementById('night-display').innerText = `NIGHT ${this.currentNight}`;
            document.getElementById('ui-night-val').innerText = `Night ${this.currentNight}`;

            this.setupListeners();
            this.populateLineup();
            this.populateCameraButtons();
        }

        setupListeners() {
            document.getElementById('init-screen').addEventListener('click', () => {
                document.getElementById('init-screen').style.display = 'none';
                document.getElementById('start-screen').style.display = 'flex';
                const music = document.getElementById('menu-music');
                if (music) music.play().catch(() => {});
            });

            document.getElementById('continue-btn').onclick = () => this.startGame();
            document.getElementById('new-game-btn').onclick = () => {
                localStorage.clear();
                this.currentNight = 1;
                this.startGame();
            };

            document.getElementById('btn-door-l').onclick = () => this.toggleDoor('left');
            document.getElementById('btn-door-r').onclick = () => this.toggleDoor('right');
            
            document.getElementById('btn-light-l').onmousedown = () => this.toggleLight('left', true);
            document.getElementById('btn-light-l').onmouseup = () => this.toggleLight('left', false);
            document.getElementById('btn-light-r').onmousedown = () => this.toggleLight('right', true);
            document.getElementById('btn-light-r').onmouseup = () => this.toggleLight('right', false);
            
            document.getElementById('monitor-toggle-btn').onclick = () => this.toggleMonitor();
            document.getElementById('monitor-close-btn').onclick = () => this.toggleMonitor();

            document.getElementById('retry-btn').onclick = () => location.reload();
            document.getElementById('win-btn').onclick = () => {
                this.currentNight++;
                localStorage.setItem('bobs_save', this.currentNight);
                location.reload();
            };
        }

        populateLineup() {
            document.getElementById('lineup').innerHTML = ANIMS_DATA.map(a => `
                <div class="anim-lineup-container">
                    <div class="anim-lineup-name">${a.name}</div>
                    <div class="anim-lineup-icon">${a.icon}</div>
                </div>
            `).join('');
        }

        populateCameraButtons() {
            const container = document.getElementById('camera-buttons');
            ROOM_NAMES.forEach((name, i) => {
                const btn = document.createElement('button');
                btn.className = `cam-btn ${i === 0 ? 'active' : ''}`;
                btn.innerText = `CAM ${i + 1}`;
                btn.onclick = () => this.switchCam(i);
                container.appendChild(btn);
            });
        }

        startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('office').style.display = 'flex';
            document.getElementById('ui-layer').style.display = 'block';
            
            this.tickRate = Math.max(1200, 4000 - (this.currentNight * 300));
            this.gameLoop = setInterval(() => this.tick(), this.tickRate);
            
            // Per-second updates (Jerry, Power, Goldie)
            this.secLoop = setInterval(() => this.secondTick(), 1000); 
            
            this.clockLoop = setInterval(() => {
                this.time++;
                if (this.time >= 6) this.win();
                this.updateUI();
            }, 45000); 
        }

        secondTick() {
            if (this.isGameOver) return;
            
            // Power Drain
            let usage = 0.15;
            if (this.doors.left) usage += 0.4;
            if (this.doors.right) usage += 0.4;
            if (this.isMonitorOpen) usage += 0.3;
            this.power -= usage;
            if (this.power <= 0) this.jumpscare("🌑");

            // Jerry Logic (Must watch Cam 8)
            if (!this.isMonitorOpen || this.currentCam !== 8) {
                this.jerryTimer--;
                if (this.jerryTimer <= 0) this.jumpscare("🦊");
            } else {
                // Watching him resets him
                this.jerryTimer = 20;
            }

            // Goldie Logic
            if (this.goldieActive) {
                this.goldieTimer--;
                document.getElementById('goldie-timer').innerText = this.goldieTimer;
                if (this.goldieTimer <= 0) this.jumpscare("🟡");
            }

            this.updateUI();
        }

        tick() {
            if (this.isGameOver) return;
            this.animatronics.forEach(anim => {
                if (anim.special === "goldie") {
                    if (Math.random() > 0.94 && !this.goldieActive && !this.isMonitorOpen) this.spawnGoldie();
                } else if (!anim.teleportOnly) {
                    if (Math.random() > (0.65 - (this.currentNight * 0.05))) {
                        this.moveAnim(anim);
                    }
                }
            });
            this.updateVisuals();
        }

        spawnGoldie() {
            this.goldieActive = true;
            this.goldieTimer = 10;
            document.getElementById('goldie-office').style.display = 'block';
            document.getElementById('goldie-timer').style.display = 'block';
        }

        moveAnim(anim) {
            let idx = anim.path.indexOf(anim.pos);
            let next = anim.path[idx + 1];
            if (next === "OFFICE_L" || next === "OFFICE_R") {
                anim.pos = next;
                setTimeout(() => {
                    if (this.isGameOver) return;
                    if (anim.pos === "OFFICE_L" && !this.doors.left) this.jumpscare(anim.icon);
                    else if (anim.pos === "OFFICE_R" && !this.doors.right) this.jumpscare(anim.icon);
                    else anim.pos = 0; // Return to start if blocked
                }, 3000 - (this.currentNight * 200));
            } else if (next !== undefined) {
                anim.pos = next;
            } else {
                anim.pos = 0;
            }
        }

        toggleDoor(side) {
            this.doors[side] = !this.doors[side];
            document.getElementById(`${side}-door`).classList.toggle('closed', this.doors[side]);
            document.getElementById(`btn-door-${side.charAt(0)}`).classList.toggle('active', this.doors[side]);
        }

        toggleLight(side, state) {
            this.lights[side] = state;
            document.getElementById(`${side}-hall`).classList.toggle('light-on', state);
        }

        toggleMonitor() {
            this.isMonitorOpen = !this.isMonitorOpen;
            document.getElementById('monitor-overlay').style.display = this.isMonitorOpen ? 'flex' : 'none';
            if (this.isMonitorOpen) {
                this.renderCam();
                // Opening monitor scares off Goldie
                if (this.goldieActive) {
                    this.goldieActive = false;
                    document.getElementById('goldie-office').style.display = 'none';
                    document.getElementById('goldie-timer').style.display = 'none';
                }
            }
        }

        switchCam(idx) {
            this.currentCam = idx;
            document.querySelectorAll('.cam-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
            this.renderCam();
        }

        renderCam() {
            const visual = document.getElementById('animatronic-visual');
            const visible = this.animatronics.filter(a => a.pos === this.currentCam);
            visual.innerHTML = visible.map(a => `<div class="cam-anim-icon">${a.icon}</div>`).join('');
            document.getElementById('cam-label').innerText = `CAM 0${this.currentCam + 1}: ${ROOM_NAMES[this.currentCam]}`;
        }

        updateVisuals() {
            const l = this.animatronics.filter(a => a.pos === "OFFICE_L");
            const r = this.animatronics.filter(a => a.pos === "OFFICE_R");
            document.getElementById('left-door-anim').innerText = l.length > 0 ? l[0].icon : "";
            document.getElementById('right-door-anim').innerText = r.length > 0 ? r[0].icon : "";
        }

        updateUI() {
            document.getElementById('power-val').innerText = Math.max(0, Math.floor(this.power));
            document.getElementById('clock-val').innerText = this.time === 0 ? 12 : this.time;
            
            const jerryVal = document.getElementById('jerry-ui-val');
            jerryVal.innerText = Math.max(0, this.jerryTimer);
            
            const jerryContainer = document.getElementById('jerry-ui-container');
            if (this.jerryTimer < 8) {
                jerryContainer.classList.add('jerry-warning');
            } else {
                jerryContainer.classList.remove('jerry-warning');
            }
        }

        jumpscare(icon) {
            if (this.isGameOver) return;
            this.isGameOver = true;
            clearInterval(this.gameLoop);
            clearInterval(this.secLoop);
            clearInterval(this.clockLoop);
            const js = document.getElementById('jumpscare');
            js.innerText = icon;
            js.style.display = 'flex';
            setTimeout(() => {
                js.style.display = 'none';
                document.getElementById('death-screen').style.display = 'flex';
            }, 1500);
        }

        win() {
            this.isGameOver = true;
            clearInterval(this.gameLoop);
            clearInterval(this.secLoop);
            clearInterval(this.clockLoop);
            document.getElementById('win-screen').style.display = 'flex';
        }
    }

    window.onload = () => new Game();
</script>
</body>
</html>
